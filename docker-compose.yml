version: "3.9"

services:

  backend:
    build: ./backend
    container_name: shayak-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - qdrant
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    container_name: shayak-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app

  redis:
    image: redis:7
    container_name: shayak-redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant
    container_name: shayak-qdrant
    ports:
      - "6333:6333"

  prometheus:
    image: prom/prometheus
    container_name: shayak-prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: shayak-grafana
    ports:
      - "3001:3000"
